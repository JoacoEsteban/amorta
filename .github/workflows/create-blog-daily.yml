name: Create Daily Blog Post

on:
  schedule:
    - cron: '0 8 */3 * *' # 8am UTC = 5am UTC-3 (America/Argentina), every 3 days
  workflow_dispatch: # Allow manual trigger

jobs:
  create-blog:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jj (latest)
        run: |
          URL=$(curl -s https://api.github.com/repos/jj-vcs/jj/releases/latest \
            | grep browser_download_url \
            | grep x86_64-unknown-linux-musl.tar.gz \
            | cut -d '"' -f 4)

          curl -L "$URL" -o jj.tar.gz
          tar -xzf jj.tar.gz
          sudo mv ./jj /usr/local/bin/jj

      - name: Verify jj
        run: jj --version

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install pi
        run: bun install -g @mariozechner/pi-coding-agent

      - name: Create blog post
        run: bun run scripts/create-blog.ts
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Push changes
        run: git push
