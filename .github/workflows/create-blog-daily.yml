name: Create Daily Blog Post

on:
  schedule:
    - cron: '0 8 */3 * *' # 8am UTC = 5am UTC-3 (America/Argentina), every 3 days
  workflow_dispatch: # Allow manual trigger

jobs:
  create-blog:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install pi
        run: bun install -g @mariozechner/pi-coding-agent && pi install npm:@feniix/pi-exa

      - name: Configure git
        run: |
          git config user.name "Amorta Bot"
          git config user.email "dev.joaco.esteban@gmail.com"

      - name: Create blog post
        run: bun run scripts/create-blog.ts
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CREATE_BLOG_MODEL: ${{ vars.CREATE_BLOG_MODEL }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          PI_SESSION_DIR: /tmp/pi-session

      - name: Export agent session
        if: always()
        run: |
          SESSION=$(find /tmp/pi-session -name "*.jsonl" | head -1)
          if [ -n "$SESSION" ]; then
            pi --export "$SESSION" /tmp/agent-session.html
          fi

      - name: Upload agent session
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-session-${{ github.run_id }}
          path: /tmp/agent-session.html
          if-no-files-found: warn

      - name: Commit any uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "feat: add blog post"
          fi

      - name: Verify new commits exist
        run: |
          git fetch origin
          NEW=$(git log origin/HEAD..HEAD --oneline | wc -l)
          if [ "$NEW" -eq 0 ]; then
            echo "Agent produced no commits. Failing."
            exit 1
          fi

      - name: Run tests
        run: bun test

      - name: Push changes
        run: git push
